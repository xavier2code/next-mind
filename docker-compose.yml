services:
  postgres:
    image: docker.xuanyuan.run/library/postgres:16-alpine
    container_name: nextmind-postgres
    environment:
      POSTGRES_USER: nextmind
      POSTGRES_PASSWORD: nextmind
      POSTGRES_DB: nextmind
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextmind -d nextmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextmind-app
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
